<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Creature Rater Experiment</title>
    <link href="https://unpkg.com/jspsych@8.2.2/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
      :root {
        --bg:#0f172a;
        --card:#111827;
        --muted:#94a3b8;
        --accent:#6366f1;
        --border:#1f2937;
        --ink:#e5e7eb;
        --ink-dim:#cbd5e1;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
      }
      .screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .screen-card {
        background: #0b1220;
        border: 1px solid var(--border);
        padding: 18px;
        border-radius: 12px;
        max-width: 1100px;
        width: min(96vw, 1100px);
      }
      .screen-card.narrow { max-width: 760px; }
      .screen-card h2 {
        margin: 0 0 10px;
        font-size: 24px;
      }
      .screen-card p {
        margin: 0 0 12px;
        color: var(--ink-dim);
        line-height: 1.45;
      }
      .row {
        display: flex;
        gap: 10px;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
      }
      .btn {
        background:#1f2937;
        border:1px solid var(--border);
        color: var(--ink);
        padding:12px 18px;
        border-radius:10px;
        cursor:pointer;
        font-size:18px;
      }
      .btn.primary { background: var(--accent); border-color:#4f46e5; color:#fff; }
      .btn:disabled { opacity: .45; cursor: not-allowed; }
      .center { text-align: center; }
      .collage-grid {
        display: grid;
        grid-template-columns: repeat(10, minmax(0, 1fr));
        gap: 6px;
        margin: 12px 0;
      }
      .collage-grid img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: contain;
        background: #0f172a;
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      .rating-media {
        display: grid;
        grid-template-columns: minmax(0, 58%) minmax(0, 42%);
        align-items: start;
        gap: 10px;
        margin-bottom: 14px;
      }
      .media-left {
        display: grid;
        gap: 10px;
      }
      .questions-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 18px;
      }
      .question-column {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #0f172a;
        padding: 12px;
      }
      .question-column-title {
        margin: 0 0 10px;
        color: var(--ink);
        font-size: 15px;
        font-weight: 700;
      }
      .open-comment {
        margin-top: 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #0f172a;
        padding: 12px;
      }
      .open-comment label {
        display: block;
        margin-bottom: 8px;
        color: var(--ink-dim);
        font-size: 14px;
        font-weight: 700;
      }
      .open-comment textarea {
        width: 100%;
        min-height: 96px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #111827;
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
        font-size: 14px;
        padding: 10px;
      }
      .creature-image {
        width: 100%;
        max-height: 460px;
        object-fit: contain;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #0f172a;
      }
      .description-box {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #0b1220;
        padding: 10px;
        height: 100%;
      }
      .description-box h4 {
        margin: 0 0 8px;
        font-size: 15px;
      }
      .description-box p {
        margin: 0;
        white-space: pre-wrap;
      }
      .field {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }
      .field-title {
        margin: 0;
        color: var(--ink-dim);
        font-size: 14px;
      }
      .likert-options {
        display: grid;
        grid-template-columns: repeat(10, minmax(24px, 1fr));
        gap: 6px;
        padding: 0 18px;
      }
      .likert-choice {
        display: grid;
        place-items: center;
        height: 36px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #111827;
        color: var(--ink);
        cursor: pointer;
        user-select: none;
        font-size: 13px;
      }
      .likert-choice input { display: none; }
      .likert-choice.is-selected {
        border-color: #6366f1;
        box-shadow: 0 0 0 1px #4f46e5 inset;
        background: #1f2937;
      }
      .likert-ends {
        display: grid;
        grid-template-columns: repeat(10, minmax(24px, 1fr));
        gap: 6px;
        padding: 0 18px;
        font-size: 12px;
        color: var(--ink-dim);
        line-height: 1.15;
      }
      .likert-ends span:first-child {
        grid-column: 1;
        justify-self: center;
        text-align: center;
        white-space: pre-line;
      }
      .likert-ends span:last-child {
        grid-column: 10;
        justify-self: center;
        text-align: center;
        white-space: pre-line;
      }
      .topline {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
      }
      .progress {
        color: var(--muted);
        font-weight: 600;
      }
      .warning {
        min-height: 20px;
        color: #dc2626;
        font-weight: 600;
      }
      .hidden { display: none; }
      .catalog-grid {
        display: grid;
        grid-template-columns: repeat(8, minmax(0, 1fr));
        gap: 8px;
        margin: 12px 0;
      }
      .catalog-card {
        position: relative;
        border: 1px solid var(--border);
        background: #111827;
        border-radius: 10px;
        padding: 8px;
        cursor: pointer;
      }
      .catalog-card:hover { border-color: #4b5563; }
      .catalog-card img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: contain;
        background: #0f172a;
        border-radius: 8px;
        border: 1px solid var(--border);
      }
      .catalog-num {
        margin-top: 6px;
        font-size: 12px;
        color: var(--ink-dim);
        text-align: center;
      }
      .catalog-order-badge {
        position: absolute;
        top: 6px;
        left: 6px;
        width: 22px;
        height: 22px;
        border-radius: 999px;
        background: #374151;
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 12px;
        font-weight: 700;
        border: 1px solid #6b7280;
      }
      .catalog-order-badge.is-complete {
        background: #16a34a;
        border-color: #15803d;
      }
      .catalog-order-check {
        position: absolute;
        top: -8px;
        right: -6px;
        width: 14px;
        height: 14px;
        border-radius: 999px;
        background: #052e16;
        border: 1px solid #16a34a;
        color: #86efac;
        display: grid;
        place-items: center;
        font-size: 10px;
        line-height: 1;
        font-weight: 700;
      }
      .catalog-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }
      .catalog-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .catalog-status { color: var(--ink-dim); margin: 0; }
      .instructions-overlay {
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 23, 0.72);
        display: grid;
        place-items: center;
        z-index: 60;
      }
      .instructions-overlay.hidden { display: none; }
      .instructions-modal {
        position: relative;
        width: min(92vw, 980px);
        max-height: 85vh;
        background: #0b1220;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 10px;
      }
      .instructions-modal-content {
        min-height: 0;
        overflow-y: auto;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #0f172a;
        padding: 12px;
        text-align: left;
      }
      .instructions-close-x {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 34px;
        height: 34px;
        border-radius: 999px;
        padding: 0;
        display: grid;
        place-items: center;
        font-size: 20px;
        line-height: 1;
      }
      @media (max-width: 980px) {
        .collage-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); }
        .catalog-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
        .rating-media { grid-template-columns: 1fr; }
        .questions-layout { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/jspsych@8.2.2"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>
    <script src="DrawingsNDescriptions/catalog_manifest.js?v=20260421a"></script>
    <script src="timeline_RaterTask.js?v=20260421a"></script>
  </body>
</html>
