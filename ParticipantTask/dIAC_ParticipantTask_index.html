<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Creative Creature Creator</title>
    <link href="https://unpkg.com/jspsych@8.2.2/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
      :root {
        --bg:#0f172a;
        --card:#111827;
        --muted:#94a3b8;
        --accent:#6366f1;
        --border:#1f2937;
        --ink:#e5e7eb;
        --ink-dim:#cbd5e1;
        --editor-width:1344px;
        --editor-height:min(945px, calc(100dvh - 24px));
        --editor-panels-height:clamp(520px, calc(var(--editor-height) - 138px), 900px);
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body { margin: 0; background: var(--bg); color: var(--ink); font-family: Arial, Helvetica, sans-serif; }
      .wrap { width: var(--editor-width); height: var(--editor-height); max-width: none; margin: 10px auto; padding: 0 14px 18px; }
      .editor-wrap { width: var(--editor-width); height: var(--editor-height); background: var(--card); border-radius: 14px; box-shadow: 0 10px 30px rgba(0,0,0,.35); padding: 16px; overflow: hidden; }
      .hero { background: linear-gradient(135deg, rgba(99,102,241,0.18), rgba(14,165,233,0.14)); border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom: 12px; }
      .hero-top { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:0; }
      .hero-actions { display:flex; align-items:center; gap:8px; }
      .hero-right { display:flex; align-items:center; gap:8px; }
      .timer-display { font-weight: 600; font-size: 18px; color: var(--ink); padding: 4px 10px; border-radius: 8px; background: #0b1220; border: 1px solid var(--border); min-width: 72px; text-align: center; }
      .hero h1 { margin: 0; font-weight:700; letter-spacing:1px; font-size: 28px; font-family: Arial, Helvetica, sans-serif; text-align:center; flex:1; }
      .hero p { margin: 4px 0; color: var(--muted); }
      .layout { display: grid; grid-template-columns: 320px 1fr 240px; gap: 14px; align-items: start; }
      .panel { display: grid; gap: 12px; }
      .stack { display: grid; gap: 10px; }
      .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      .btn { background:#1f2937; border:1px solid var(--border); color: var(--ink); padding:13px 18px; border-radius:10px; cursor:pointer; font-size:22px; }
      .btn:hover { border-color:#4b5563; filter: brightness(1.03); }
      .btn:disabled { opacity: .45; cursor: not-allowed; filter:none; }
      .hero-top .btn { font-size: 24px; line-height: 1; padding: 6px 12px; background:#0b1220; border-color:#334155; box-shadow: 0 0 0 1px #475569 inset; }
      .hero-top .icon-btn { font-size: 28px; padding: 0; width: 56px; height: 56px; }
      .hero-top .icon-btn img { width: 40px; height: 40px; }
      .btn.primary { background: var(--accent); border-color:#4f46e5; color:#fff; }
      .btn.active { background:#8b5cf6; border-color:#7c3aed; color:#fff; }
      .btn.recording { background:#dc2626; border-color:#b91c1c; color:#fff; box-shadow: 0 0 0 1px #ef4444 inset; }
      #record-video { background:#fecaca; border-color:#fca5a5; color:#7f1d1d; }
      #record-video.recording { background:#dc2626; border-color:#b91c1c; color:#fff; box-shadow: 0 0 0 1px #ef4444 inset; }
      .icon-btn { font-size: 44px; line-height: 1; padding: 0; width: 82px; height: 82px; display:grid; place-items:center; }
      .icon-btn img { width: 64px; height: 64px; display:block; object-fit:contain; pointer-events:none; }
      .draw-tools { display:grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; width: 100%; }
      .draw-tools .icon-btn { width: 100%; min-height: 96px; padding: 0; }
      .draw-tools .icon-btn img { width: 85px; height: 85px; }
      .range { width: 160px; }
      input[type="range"] { accent-color: var(--accent); }
      .color { width: 44px; height: 36px; padding: 0; border-radius: 8px; border:1px solid var(--border); background:#0b1220; }
      .canvas-wrap {
        background-color: #ffffff;
        border: 2px solid #1f2937;
        border-radius: 14px;
        width: 100%;
        max-width: 600px;
        aspect-ratio: 1 / 1;
        height: auto;
        position: relative;
        overflow: hidden;
        margin: 0 auto;
        user-select: none;
        -webkit-user-select: none;
      }
      #stage { width: 100%; height: 100%; display: block; user-select: none; -webkit-user-select: none; }
      .layers-panel { background:#0b1220; border:1px solid var(--border); border-radius:12px; padding:10px; }
      .tools-panel-fixed { height: var(--editor-panels-height); max-height: var(--editor-panels-height); min-height: var(--editor-panels-height); grid-template-rows: auto 1fr; }
      .elements-panel-fixed { min-height: 0; grid-template-rows: auto auto; align-content:start; }
      .layers-panel-fixed { height: var(--editor-panels-height); max-height: var(--editor-panels-height); min-height: var(--editor-panels-height); grid-template-rows: auto auto auto 1fr auto; }
      .layer-list { display:grid; gap:8px; min-height: 0; overflow: auto; align-content: start; padding-right: 4px; }
      #sticker-grid { min-height: 0; max-height: 560px; overflow: auto; align-content: start; }
      .layer-item { background:#111827; border:1px solid var(--border); border-radius:10px; padding:6px 8px; cursor:grab; font-size:12px; display:flex; align-items:center; gap:8px; }
      .layer-item.active { border-color:#6366f1; box-shadow: 0 0 0 1px #4f46e5 inset; }
      .layer-item.dragover { border-color:#fbbf24; }
      .layer-item.drop-before { box-shadow: inset 0 2px 0 #fde68a; }
      .layer-item.drop-after { box-shadow: inset 0 -2px 0 #fde68a; }
      .layer-icon { width: 28px; height: 28px; background:#0b1220; border:1px solid var(--border); border-radius:6px; display:grid; place-items:center; flex:0 0 28px; }
      .layer-icon svg { width: 100%; height: 100%; }
      .layer-info { display:flex; align-items:center; gap:8px; flex:1; min-width:0; }
      .layer-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .layer-name-input { width: 100%; min-width: 0; background: transparent; border: 1px solid transparent; color: var(--ink); font: inherit; padding: 2px 4px; border-radius: 6px; }
      .layer-name-input:focus { outline: none; border-color: #6366f1; background: #0b1220; }
      .layer-name-input[readonly] { pointer-events: none; cursor: grab; }
      .layer-name-input:not([readonly]) { pointer-events: auto; cursor: text; }
      .gallery { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
      .thumb { background:#0b1220; border:1px solid var(--border); border-radius:12px; padding:14px; cursor:pointer; display:grid; place-items:center; }
      .thumb.active { border-color:#6366f1; box-shadow: 0 0 0 1px #4f46e5 inset; }
      .thumb svg { width: 100%; height: 170px; }
      .cat-tabs { display:flex; gap:6px; flex-wrap:wrap; }
      .chip { background:#0b1220; border:1px solid var(--border); color:var(--ink); padding:6px 10px; border-radius:999px; font-size:12px; cursor:pointer; }
      .chip.active { border-color:#6366f1; box-shadow: 0 0 0 1px #4f46e5 inset; }
      .sticker-grid { display:grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
      .sticker { background:#0b1220; border:1px solid var(--border); border-radius:10px; padding:8px; cursor:pointer; display:grid; place-items:center; aspect-ratio: 1 / 1; }
      .sticker svg { width: 100%; height: 48px; display:block; margin:auto; }
      .sticker.sticker-shape svg { transform: none; }
      .sticker.spacer { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }
      .hint { font-size: 12px; color: var(--ink-dim); }
      .hint.warn { color: #fbbf24; }
      .hint-icon { width: 26px; height: 26px; display:block; object-fit:contain; }
      .color-controls { display:flex; gap:6px; flex-wrap:wrap; }
      .color-row { display:flex; align-items:center; gap:6px; }
      .color-row .color { width: 44px; height: 32px; border-radius: 8px; }
      .color-row .range { min-width: 120px; }
      .palette-symbol { margin-right: 4px; width: 18px; height: 18px; display:inline-grid; place-items:center; }
      .palette-symbol img { width: 18px; height: 18px; object-fit: contain; display:block; }
      img { -webkit-user-drag: none; user-drag: none; user-select: none; }
      .palette-wrap { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
      .palette-swatch { width: 20px; height: 20px; border-radius: 4px; border: 1px solid var(--border); cursor:pointer; padding:0; background: transparent; }
      .palette-swatch.active { box-shadow: 0 0 0 2px #e2e8f0 inset; }
      .draw-palette { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
      .palette-dropdown { position: relative; display:inline-flex; align-items:center; gap:6px; }
      .palette-trigger { display:flex; align-items:center; gap:6px; padding:6px 8px; border-radius:10px; border:1px solid var(--border); background:#0b1220; color:var(--ink); cursor:pointer; }
      .palette-trigger .swatch { width: 18px; height: 18px; border-radius:4px; border:1px solid var(--border); display:block; }
      .palette-trigger .caret { font-size: 12px; opacity: 0.7; }
      .palette-menu { position:absolute; top: 110%; left: 0; z-index: 20; background:#0b1220; border:1px solid var(--border); border-radius:12px; padding:10px; display:none; box-shadow: 0 10px 20px rgba(0,0,0,.35); min-width: 160px; }
      .palette-grid { display:grid; grid-template-columns: repeat(6, 20px); gap:8px; }
      .brightness-row { margin-top: 8px; }
      .palette-brightness {
        width: 100%;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--base-color, #6b7280) 0%, var(--max-color, #e5e7eb) 100%);
        border: 1px solid var(--border);
        appearance: none;
      }
      .palette-brightness::-webkit-slider-thumb {
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--current-color, #6b7280);
        border: 2px solid #0b1220;
        box-shadow: 0 0 0 1px #e2e8f0 inset;
        cursor: pointer;
      }
      .palette-brightness::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--current-color, #6b7280);
        border: 2px solid #0b1220;
        box-shadow: 0 0 0 1px #e2e8f0 inset;
        cursor: pointer;
      }
      .palette-dropdown.open .palette-menu { display:block; }
      .brush-preview { width: 70px; height: 22px; border:1px solid var(--border); border-radius:999px; background:#0b1220; display:block; }
      .brush-preview line { stroke:#d1d5db; stroke-linecap:round; }
      .guide { stroke:#6366f1; stroke-width:1; stroke-dasharray:4 4; }
      .box { fill:none; stroke:#e2e8f0; stroke-width:1; }
      .marquee-box { fill: rgba(99,102,241,0.15); stroke:#6366f1; stroke-width:1; stroke-dasharray:4 3; pointer-events:none; }
      .crop-box { fill: rgba(16,185,129,0.14); stroke:#10b981; stroke-width:1.5; stroke-dasharray:6 3; }
      .crop-handle { fill:#10b981; stroke:#0f172a; stroke-width:2; cursor:pointer; }
      .handle { fill:#e2e8f0; stroke:#0f172a; stroke-width:2; cursor:pointer; }
      .rotate-handle { fill:#6366f1; stroke:#0f172a; stroke-width:2; cursor:grab; }
      .rotate-line { stroke:#6366f1; stroke-width:2; }
      .center-crosshair { stroke: #f59e0b; stroke-width: 1.5; opacity: 0.9; pointer-events: none; }
      .center-crosshair-dot { fill: #f59e0b; opacity: 0.9; pointer-events: none; }
      body.debug-sticker-centers .sticker { outline: 1px dashed rgba(245, 158, 11, 0.9); }
      body.debug-sticker-centers .sticker svg { outline: 1px solid rgba(245, 158, 11, 0.6); }
      .draw-path { fill: none; stroke: #fbbf24; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .fullscreen-gate { position: fixed; inset: 0; background: rgba(11,18,32,0.9); display: grid; place-items: center; z-index: 9999; }
      .fullscreen-card { background: #0b1220; border: 1px solid var(--border); padding: 18px; border-radius: 12px; max-width: 420px; text-align: center; }
      .canvas-col { display: grid; gap: 12px; align-content: start; }
      .description-box { margin-top: 0; display: grid; gap: 8px; }
      .description-box #creature-name {
        width: 50%;
        background: #0b1220;
        border: 1px solid var(--border);
        color: var(--ink);
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
        margin: 0;
        display: block;
      }
      .description-box #creature-name::placeholder { color: var(--ink-dim); }
      .description-box textarea { width: 100%; min-height: 120px; resize: vertical; background: #0b1220; border: 1px solid var(--border); color: var(--ink); border-radius: 10px; padding: 10px 12px; font: inherit; max-width: 900px; margin: 0 auto; display: block; }
      .description-box textarea::placeholder { color: var(--ink-dim); }
      .summary-screen { position: fixed; inset: 0; background: rgba(11,18,32,0.92); display: none; place-items: center; z-index: 9998; }
      .summary-screen.active { display: grid; }
      .summary-card { background: #0b1220; border: 1px solid var(--border); padding: 16px; border-radius: 12px; max-width: 900px; width: min(92vw, 900px); display: grid; gap: 12px; }
      .summary-preview { width: 100%; max-height: 40vh; object-fit: contain; border-radius: 12px; border: 1px solid var(--border); background: #0b1220; }
      .summary-actions { display: flex; justify-content: flex-end; }
      .overlay-message { position: fixed; inset: 0; background: rgba(11,18,32,0.75); display: none; place-items: center; z-index: 9997; }
      .overlay-message.active { display: grid; }
      #timeout-message { pointer-events: auto; }
      .overlay-card { background: #0b1220; border: 1px solid var(--border); padding: 16px; border-radius: 12px; max-width: 420px; text-align: center; }
      .overlay-card .row { justify-content: center; }
      .fullscreen-card h2 { margin: 0 0 8px; font-size: 20px; }
      .fullscreen-card p { margin: 0 0 12px; color: var(--ink-dim); }
      .fullscreen-card .row { justify-content: center; }
      .fullscreen-hidden { display: none; }
      .muted { color: var(--muted); }
      .screen { min-height: 100vh; display: none; place-items: center; padding: 24px; }
      .screen.active { display: grid; }
      .screen-card { background: #0b1220; border: 1px solid var(--border); padding: 18px; border-radius: 12px; max-width: 760px; width: min(92vw, 760px); }
      .screen-card.narrow { max-width: 520px; width: min(92vw, 520px); }
      .screen-card h2 { margin: 0 0 8px; font-size: 22px; }
      .screen-card h2.center { text-align: center; }
      .screen-card p { margin: 0 0 12px; color: var(--ink-dim); }
      .screen-card .row { justify-content: center; }
      .screen-card .stack { gap: 8px; }
      .screen-card label { font-size: 13px; color: var(--ink-dim); }
      .screen-card input[type="text"] {
        width: 100%;
        background: #0b1220;
        color: var(--ink);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px 10px;
        font: inherit;
        margin-top: 6px;
      }
      .important { text-align: center; font-weight: 700; color: var(--ink); }
      .editor-screen { display: none; }
      .editor-screen.active { display: block; }
      @media (max-width: 980px) {
        .layout { grid-template-columns: 1fr; }
        .canvas-wrap { max-width: 100%; }
        .tools-panel-fixed { height: auto; max-height: none; min-height: 0; }
        .elements-panel-fixed { min-height: auto; }
        #sticker-grid { max-height: 320px; }
        .layers-panel-fixed { height: auto; max-height: none; min-height: 0; }
        .layer-list { max-height: 260px; }
      }
    </style>
  </head>
    <body>
    <script src="https://unpkg.com/jspsych@8.2.2"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <script src="plugin_CrCrCr.js"></script>
    <script src="timeline_ParticipantTask.js"></script>
  </body>
</html>
